<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกประจำวัน</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-soft: #3d3d5c;
    --ink-muted: #8888aa;
    --page: #f8f7f2;
    --page-warm: #f0ede4;
    --line: #e2ddd5;
    --accent: #c2714f;
    --accent-light: #f2e8e3;
    --accent-hover: #a85c3c;
    --green: #4a7c59;
    --green-light: #e8f2eb;
    --shadow-sm: 0 1px 4px rgba(26,26,46,0.08);
    --shadow-md: 0 4px 16px rgba(26,26,46,0.12);
    --shadow-lg: 0 12px 40px rgba(26,26,46,0.18);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--page);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ─── LOADING ─── */
  #loading-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #2d2d52 60%, #3d3353 100%);
    flex-direction: column;
    gap: 16px;
    color: white;
    font-size: 16px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── LOGIN SCREEN ─── */
  #login-screen {
    min-height: 100vh;
    display: none;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #2d2d52 60%, #3d3353 100%);
    padding: 20px;
  }

  .login-box {
    background: var(--page);
    border-radius: 20px;
    padding: 48px 40px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }

  .login-mark {
    width: 64px; height: 64px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    font-size: 28px;
  }

  .login-box h1 {
    font-family: 'Noto Serif Thai', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .login-box p {
    color: var(--ink-muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .avatar-upload-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .avatar-preview {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--page-warm);
    border: 3px dashed var(--line);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.2s;
    position: relative;
  }

  .avatar-preview:hover { border-color: var(--accent); }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .avatar-preview .avatar-icon { font-size: 32px; color: var(--ink-muted); }
  .avatar-hint { font-size: 12px; color: var(--ink-muted); }

  .field-group { margin-bottom: 16px; text-align: left; }

  .field-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .field-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: white;
    transition: border-color 0.2s;
    outline: none;
  }

  .field-group input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ─── MAIN APP ─── */
  #app-screen { display: none; min-height: 100vh; }

  .app-header {
    background: var(--ink);
    color: white;
    padding: 0 24px;
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(26,26,46,0.3);
  }

  .header-brand {
    display: flex; align-items: center; gap: 10px;
  }

  .header-brand span:first-child { font-size: 20px; }

  .header-brand .brand-text {
    font-family: 'Noto Serif Thai', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .user-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .user-avatar img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .user-name { font-size: 14px; color: rgba(255,255,255,0.85); }

  .btn-logout {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    padding: 5px 12px;
    border-radius: 6px;
    font-family: 'Sarabun', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-logout:hover { background: rgba(255,255,255,0.18); color: white; }

  .app-body {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 28px;
    align-items: start;
  }

  .sidebar { position: sticky; top: 90px; }

  .sidebar-card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
    margin-bottom: 16px;
  }

  .sidebar-card h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    margin-bottom: 14px;
  }

  .profile-display {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 16px;
  }

  .profile-avatar-lg {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    overflow: hidden;
    flex-shrink: 0;
  }

  .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; display: none; }

  .profile-name { font-size: 15px; font-weight: 600; color: var(--ink); }
  .profile-sub { font-size: 12px; color: var(--ink-muted); }

  .date-today {
    background: var(--ink);
    color: white;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    text-align: center;
  }

  .date-day { font-family: 'Noto Serif Thai', serif; font-size: 36px; font-weight: 700; line-height: 1; }
  .date-month { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; }

  .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .stat-label { font-size: 13px; color: var(--ink-muted); }
  .stat-val { font-size: 13px; font-weight: 600; color: var(--ink); }

  .new-entry-card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .card-header {
    background: var(--ink);
    color: white;
    padding: 16px 20px;
    font-family: 'Noto Serif Thai', serif;
    font-size: 15px;
    font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }

  .card-body { padding: 20px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row.full { grid-template-columns: 1fr; }

  .form-field { display: flex; flex-direction: column; gap: 6px; }

  .form-field label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
  }

  .form-field input,
  .form-field textarea,
  .form-field select {
    padding: 10px 12px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--page);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    min-height: 42px;
  }

  .form-field textarea { min-height: 80px; }

  .form-field input:focus,
  .form-field textarea:focus,
  .form-field select:focus {
    border-color: var(--accent);
    background: white;
  }

  .img-upload-area {
    border: 2px dashed var(--line);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--page);
  }

  .img-upload-area:hover { border-color: var(--accent); background: var(--accent-light); }
  .img-upload-area .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .img-upload-area p { font-size: 13px; color: var(--ink-muted); }
  .img-upload-area strong { color: var(--accent); }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }

  .preview-thumb {
    position: relative;
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    background: var(--line);
  }

  .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .preview-thumb .remove-img {
    position: absolute;
    top: 3px; right: 3px;
    width: 20px; height: 20px;
    background: rgba(26,26,46,0.7);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }

  .btn-save {
    padding: 10px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; gap: 6px;
  }

  .btn-save:hover { background: var(--accent-hover); }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-clear {
    padding: 10px 18px;
    background: transparent;
    color: var(--ink-muted);
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .btn-clear:hover { border-color: var(--ink-muted); color: var(--ink); }

  .entries-list { display: flex; flex-direction: column; gap: 16px; }

  .entry-card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .entry-card:hover { box-shadow: var(--shadow-md); }

  .entry-head {
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    gap: 12px;
  }

  .entry-meta { flex: 1; min-width: 0; }

  .entry-activity {
    font-family: 'Noto Serif Thai', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .entry-badges { display: flex; gap: 6px; flex-wrap: wrap; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-time { background: var(--page-warm); color: var(--ink-soft); }
  .badge-date { background: var(--accent-light); color: var(--accent); }

  .entry-actions { display: flex; gap: 4px; }

  .btn-icon {
    width: 30px; height: 30px;
    border: none;
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .btn-icon:hover { background: var(--page-warm); }
  .btn-icon.danger:hover { background: #fde8e8; }

  .entry-body { padding: 14px 18px; }

  .entry-section { margin-bottom: 12px; }
  .entry-section:last-child { margin-bottom: 0; }

  .entry-section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
    margin-bottom: 4px;
  }

  .entry-section-content {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  .entry-section.problem .entry-section-content {
    color: #c0392b;
    background: #fef5f5;
    padding: 8px 10px;
    border-radius: 6px;
    border-left: 3px solid #e74c3c;
  }

  .entry-section.solution .entry-section-content {
    color: var(--green);
    background: var(--green-light);
    padding: 8px 10px;
    border-radius: 6px;
    border-left: 3px solid var(--green);
  }

  .entry-photos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 6px;
    margin-top: 10px;
  }

  .entry-photo {
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
  }

  .entry-photo img { width: 100%; height: 100%; object-fit: cover; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-muted);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; color: var(--ink-soft); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    box-shadow: var(--shadow-lg);
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    z-index: 999;
    display: flex; align-items: center; gap: 8px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: #c0392b; }

  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,20,0.9);
    z-index: 500;
    align-items: center; justify-content: center;
  }

  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  .lightbox-close {
    position: absolute; top: 20px; right: 20px;
    font-size: 28px; color: white; cursor: pointer;
    background: none; border: none;
    width: 40px; height: 40px;
  }

  .filter-bar {
    display: flex; gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-input {
    flex: 1;
    min-width: 160px;
    padding: 9px 12px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }

  .filter-input:focus { border-color: var(--accent); }

  .filter-date {
    padding: 9px 12px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: white;
    outline: none;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .filter-date:focus { border-color: var(--accent); }

  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-head h2 {
    font-family: 'Noto Serif Thai', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }

  @media (max-width: 700px) {
    .app-body { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spinner"></div>
  <span>กำลังเชื่อมต่อ...</span>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-mark">📔</div>
    <h1>บันทึกประจำวัน</h1>
    <p>ล็อคอินเพื่อเริ่มต้นบันทึกกิจกรรมของคุณ</p>

    <div class="avatar-upload-zone">
      <div class="avatar-preview" onclick="document.getElementById('login-avatar-input').click()">
        <img id="login-avatar-preview" alt="รูปโปรไฟล์">
        <div class="avatar-icon">👤</div>
      </div>
      <span class="avatar-hint">แตะเพื่ออัปโหลดรูปโปรไฟล์ (ไม่บังคับ)</span>
      <input type="file" id="login-avatar-input" accept="image/*" style="display:none" onchange="previewLoginAvatar(event)">
    </div>

    <div class="field-group">
      <label>ชื่อของคุณ</label>
      <input type="text" id="login-name" placeholder="กรอกชื่อ–นามสกุล หรือชื่อเล่น" autocomplete="name">
    </div>

    <div class="field-group">
      <label>รหัสผ่าน (ตั้งเองได้เลย)</label>
      <input type="password" id="login-pass" placeholder="รหัสผ่านอย่างน้อย 4 ตัว" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn-primary" id="login-btn" onclick="doLogin()">เข้าสู่ระบบ / สมัครใช้งาน</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header class="app-header">
    <div class="header-brand">
      <span>📔</span>
      <span class="brand-text">บันทึกประจำวัน</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="user-avatar" id="header-avatar">
          <img id="header-avatar-img" alt="">
          <span id="header-avatar-initial"></span>
        </div>
        <span class="user-name" id="header-name"></span>
      </div>
      <button class="btn-logout" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-card">
        <h3>โปรไฟล์</h3>
        <div class="profile-display">
          <div class="profile-avatar-lg" id="sidebar-avatar">
            <img id="sidebar-avatar-img" alt="">
            <span id="sidebar-avatar-initial"></span>
          </div>
          <div>
            <div class="profile-name" id="sidebar-name"></div>
            <div class="profile-sub" id="sidebar-date-str"></div>
          </div>
        </div>
        <div class="date-today">
          <div class="date-day" id="date-num"></div>
          <div class="date-month" id="date-month-yr"></div>
        </div>
      </div>

      <div class="sidebar-card">
        <h3>สถิติ</h3>
        <div class="stat-row">
          <span class="stat-label">รายการทั้งหมด</span>
          <span class="stat-val" id="stat-total">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">วันนี้</span>
          <span class="stat-val" id="stat-today">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">มีรูปภาพ</span>
          <span class="stat-val" id="stat-photos">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">แก้ปัญหาสำเร็จ</span>
          <span class="stat-val" id="stat-solved">0</span>
        </div>
      </div>
    </aside>

    <main>
      <div class="new-entry-card">
        <div class="card-header">✏️ บันทึกรายการใหม่</div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-field">
              <label>กิจกรรม / สิ่งที่ทำ</label>
              <input type="text" id="f-activity" placeholder="เช่น ประชุมทีม, เขียนโค้ด...">
            </div>
            <div class="form-field">
              <label>เวลา</label>
              <input type="time" id="f-time">
            </div>
          </div>

          <div class="form-row full">
            <div class="form-field">
              <label>รายละเอียดสิ่งที่ทำ</label>
              <textarea id="f-detail" placeholder="อธิบายสิ่งที่ทำในวันนี้โดยละเอียด..."></textarea>
            </div>
          </div>

          <div class="form-row">
            <div class="form-field">
              <label>🔴 ปัญหาที่พบ</label>
              <textarea id="f-problem" placeholder="ปัญหาหรืออุปสรรคที่เจอ (ถ้ามี)"></textarea>
            </div>
            <div class="form-field">
              <label>🟢 วิธีแก้ปัญหา</label>
              <textarea id="f-solution" placeholder="วิธีที่ใช้แก้ปัญหา หรือแผนที่จะใช้"></textarea>
            </div>
          </div>

          <div class="form-field">
            <label>รูปภาพประกอบ</label>
            <div class="img-upload-area" onclick="document.getElementById('entry-img-input').click()">
              <div class="upload-icon">🖼️</div>
              <p>คลิกหรือลากไฟล์มาวาง<br><strong>รองรับ JPG, PNG, GIF, WebP</strong></p>
            </div>
            <input type="file" id="entry-img-input" accept="image/*" multiple style="display:none" onchange="handleEntryImages(event)">
            <div class="preview-grid" id="img-preview-grid"></div>
          </div>

          <div class="form-actions">
            <button class="btn-clear" onclick="clearForm()">ล้างฟอร์ม</button>
            <button class="btn-save" id="save-btn" onclick="saveEntry()">💾 บันทึก</button>
          </div>
        </div>
      </div>

      <div class="section-head">
        <h2>รายการทั้งหมด</h2>
      </div>

      <div class="filter-bar">
        <input type="text" class="filter-input" id="search-input" placeholder="🔍 ค้นหากิจกรรม หรือปัญหา..." oninput="renderEntries()">
        <input type="date" class="filter-date" id="date-filter" onchange="renderEntries()">
        <button class="btn-clear" style="white-space:nowrap;padding:9px 14px;font-size:13px;" onclick="clearFilters()">รีเซ็ต</button>
      </div>

      <div class="entries-list" id="entries-list"></div>
    </main>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, doc, addDoc, getDocs, deleteDoc, query, where, orderBy, onSnapshot, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDaNqgB403lBTFWSynE-jp_SuwBbOocg_k",
    authDomain: "daily-journal-77337.firebaseapp.com",
    projectId: "daily-journal-77337",
    storageBucket: "daily-journal-77337.firebasestorage.app",
    messagingSenderId: "747488749345",
    appId: "1:747488749345:web:07e8f7c6c0bf18a3290060",
    measurementId: "G-FQ6MLBEH6G"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ─── STATE ───
  let currentUser = null;
  let entries = [];
  let pendingImages = [];
  let unsubscribeEntries = null;

  // ─── INIT ───
  window.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    document.getElementById('f-time').value =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    updateDateDisplay();

    // restore session
    const saved = sessionStorage.getItem('journal_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      showApp();
      subscribeEntries();
    } else {
      showLogin();
    }
  });

  function showLogin() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showApp() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';

    const name = currentUser.name;
    const initial = name.charAt(0).toUpperCase();

    document.getElementById('header-name').textContent = name;
    document.getElementById('header-avatar-initial').textContent = initial;
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('sidebar-avatar-initial').textContent = initial;

    if (currentUser.avatar) {
      ['header-avatar-img','sidebar-avatar-img'].forEach(id => {
        const img = document.getElementById(id);
        img.src = currentUser.avatar;
        img.style.display = 'block';
      });
      document.getElementById('header-avatar-initial').style.display = 'none';
      document.getElementById('sidebar-avatar-initial').style.display = 'none';
    }
  }

  // ─── DATE DISPLAY ───
  function updateDateDisplay() {
    const now = new Date();
    const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
      'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
    document.getElementById('date-num').textContent = now.getDate();
    document.getElementById('date-month-yr').textContent = `${months[now.getMonth()]} ${now.getFullYear()+543}`;
    document.getElementById('sidebar-date-str').textContent = `วัน${days[now.getDay()]}ที่ ${now.getDate()} ${months[now.getMonth()]}`;
  }

  // ─── AVATAR PREVIEW ───
  window.previewLoginAvatar = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('login-avatar-preview');
      img.src = e.target.result;
      img.style.display = 'block';
      document.querySelector('.avatar-icon').style.display = 'none';
    };
    reader.readAsDataURL(file);
  };

  // ─── LOGIN ───
  window.doLogin = async function() {
    const name = document.getElementById('login-name').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const avatarImg = document.getElementById('login-avatar-preview');

    if (!name) { showToast('กรุณากรอกชื่อของคุณ', 'error'); return; }
    if (pass.length < 4) { showToast('รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร', 'error'); return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'กำลังเข้าสู่ระบบ...';

    try {
      const userRef = doc(db, 'users', name);
      const userSnap = await getDoc(userRef);

      const avatarData = (avatarImg.src && avatarImg.style.display !== 'none') ? avatarImg.src : null;

      if (userSnap.exists()) {
        const userData = userSnap.data();
        if (userData.password !== pass) {
          showToast('รหัสผ่านไม่ถูกต้อง', 'error');
          btn.disabled = false;
          btn.textContent = 'เข้าสู่ระบบ / สมัครใช้งาน';
          return;
        }
        currentUser = { name, password: pass, avatar: avatarData || userData.avatar || null };
        if (avatarData) {
          await setDoc(userRef, { avatar: avatarData }, { merge: true });
        }
      } else {
        // สมัครใหม่
        currentUser = { name, password: pass, avatar: avatarData };
        await setDoc(userRef, {
          name,
          password: pass,
          avatar: avatarData,
          createdAt: serverTimestamp()
        });
        showToast('สร้างบัญชีสำเร็จ ยินดีต้อนรับ!', 'success');
      }

      // บันทึก log
      await addDoc(collection(db, 'login_logs'), {
        name,
        action: 'login',
        ts: new Date().toISOString(),
        ua: navigator.userAgent.substring(0, 120)
      });

      sessionStorage.setItem('journal_user', JSON.stringify(currentUser));
      showApp();
      subscribeEntries();
    } catch (err) {
      console.error(err);
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ / สมัครใช้งาน';
    }
  };

  window.doLogout = async function() {
    if (currentUser) {
      await addDoc(collection(db, 'login_logs'), {
        name: currentUser.name,
        action: 'logout',
        ts: new Date().toISOString(),
        ua: navigator.userAgent.substring(0, 120)
      });
    }
    if (unsubscribeEntries) unsubscribeEntries();
    sessionStorage.removeItem('journal_user');
    currentUser = null;
    entries = [];
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-name').value = '';
    document.getElementById('login-pass').value = '';
  };

  // ─── REALTIME ENTRIES ───
  function subscribeEntries() {
    if (unsubscribeEntries) unsubscribeEntries();
    const q = query(
      collection(db, 'entries'),
      where('owner', '==', currentUser.name),
      orderBy('createdAt', 'desc')
    );
    unsubscribeEntries = onSnapshot(q, snap => {
      entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderEntries();
    });
  }

  // ─── IMAGES ───
  window.handleEntryImages = function(event) {
    const files = Array.from(event.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        pendingImages.push(e.target.result);
        renderImagePreviews();
      };
      reader.readAsDataURL(file);
    });
    event.target.value = '';
  };

  function renderImagePreviews() {
    const grid = document.getElementById('img-preview-grid');
    grid.innerHTML = pendingImages.map((src, i) => `
      <div class="preview-thumb">
        <img src="${src}" alt="รูป ${i+1}">
        <button class="remove-img" onclick="removeImage(${i})">✕</button>
      </div>
    `).join('');
  }

  window.removeImage = function(i) {
    pendingImages.splice(i, 1);
    renderImagePreviews();
  };

  // ─── SAVE ENTRY ───
  window.saveEntry = async function() {
    const activity = document.getElementById('f-activity').value.trim();
    const time = document.getElementById('f-time').value;
    const detail = document.getElementById('f-detail').value.trim();
    const problem = document.getElementById('f-problem').value.trim();
    const solution = document.getElementById('f-solution').value.trim();

    if (!activity) { showToast('กรุณาระบุกิจกรรมที่ทำ', 'error'); return; }
    if (!time) { showToast('กรุณาระบุเวลา', 'error'); return; }

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'กำลังบันทึก...';

    try {
      const now = new Date();
      await addDoc(collection(db, 'entries'), {
        owner: currentUser.name,
        date: now.toISOString().split('T')[0],
        time,
        activity,
        detail,
        problem,
        solution,
        images: [...pendingImages],
        createdAt: serverTimestamp()
      });
      clearForm();
      showToast('✅ บันทึกสำเร็จ!', 'success');
    } catch (err) {
      showToast('บันทึกไม่สำเร็จ: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '💾 บันทึก';
    }
  };

  window.clearForm = function() {
    ['f-activity','f-detail','f-problem','f-solution'].forEach(id => document.getElementById(id).value = '');
    const now = new Date();
    document.getElementById('f-time').value =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    pendingImages = [];
    renderImagePreviews();
  };

  // ─── DELETE ───
  window.deleteEntry = async function(id) {
    if (!confirm('ลบรายการนี้?')) return;
    await deleteDoc(doc(db, 'entries', id));
    showToast('ลบรายการแล้ว');
  };

  // ─── RENDER ───
  window.renderEntries = function() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const dateF = document.getElementById('date-filter').value;

    let filtered = entries.filter(e => {
      const matchSearch = !search ||
        e.activity.toLowerCase().includes(search) ||
        (e.detail && e.detail.toLowerCase().includes(search)) ||
        (e.problem && e.problem.toLowerCase().includes(search)) ||
        (e.solution && e.solution.toLowerCase().includes(search));
      const matchDate = !dateF || e.date === dateF;
      return matchSearch && matchDate;
    });

    const list = document.getElementById('entries-list');
    const todayStr = new Date().toISOString().split('T')[0];

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <h3>${entries.length === 0 ? 'ยังไม่มีรายการ' : 'ไม่พบรายการที่ค้นหา'}</h3>
          <p>${entries.length === 0 ? 'เริ่มบันทึกกิจกรรมแรกของคุณได้เลย!' : 'ลองเปลี่ยนคำค้นหาหรือวันที่'}</p>
        </div>`;
    } else {
      list.innerHTML = filtered.map(e => renderEntryCard(e)).join('');
    }

    document.getElementById('stat-total').textContent = entries.length;
    document.getElementById('stat-today').textContent = entries.filter(e => e.date === todayStr).length;
    document.getElementById('stat-photos').textContent = entries.filter(e => e.images && e.images.length > 0).length;
    document.getElementById('stat-solved').textContent = entries.filter(e => e.solution && e.solution.trim()).length;
  };

  function renderEntryCard(e) {
    const photosHtml = e.images && e.images.length > 0
      ? `<div class="entry-photos">${e.images.map(src =>
          `<div class="entry-photo" onclick="openLightbox('${src}')"><img src="${src}" alt="รูป"></div>`
        ).join('')}</div>` : '';

    return `
    <div class="entry-card">
      <div class="entry-head">
        <div class="entry-meta">
          <div class="entry-activity">${esc(e.activity)}</div>
          <div class="entry-badges">
            <span class="badge badge-time">🕐 ${e.time} น.</span>
            <span class="badge badge-date">📅 ${formatDate(e.date)}</span>
          </div>
        </div>
        <div class="entry-actions">
          <button class="btn-icon danger" onclick="deleteEntry('${e.id}')" title="ลบ">🗑️</button>
        </div>
      </div>
      <div class="entry-body">
        ${e.detail ? `<div class="entry-section"><div class="entry-section-label">สิ่งที่ทำ</div><div class="entry-section-content">${esc(e.detail)}</div></div>` : ''}
        ${e.problem ? `<div class="entry-section problem"><div class="entry-section-label">🔴 ปัญหาที่พบ</div><div class="entry-section-content">${esc(e.problem)}</div></div>` : ''}
        ${e.solution ? `<div class="entry-section solution"><div class="entry-section-label">🟢 วิธีแก้ปัญหา</div><div class="entry-section-content">${esc(e.solution)}</div></div>` : ''}
        ${photosHtml}
      </div>
    </div>`;
  }

  window.clearFilters = function() {
    document.getElementById('search-input').value = '';
    document.getElementById('date-filter').value = '';
    renderEntries();
  };

  // ─── LIGHTBOX ───
  window.openLightbox = function(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('show');
  };

  window.closeLightbox = function() {
    document.getElementById('lightbox').classList.remove('show');
  };

  // ─── TOAST ───
  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast${type ? ' '+type : ''}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  window.showToast = showToast;

  // ─── HELPERS ───
  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()+543}`;
  }
</script>
</body>
</html>
